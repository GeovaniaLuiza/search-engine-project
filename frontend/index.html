<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Motor de Busca</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .container {
        background: #1e293b;
        padding: 30px;
        border-radius: 12px;
        width: 420px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #38bdf8;
    }

    input, select, button {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border-radius: 8px;
        border: none;
        outline: none;
        font-size: 14px;
    }

    input, select {
        background: #334155;
        color: white;
    }

    button {
        background: #38bdf8;
        color: black;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        background: #0ea5e9;
    }

    #result {
        margin-top: 15px;
        background: #0b1220;
        padding: 10px;
        border-radius: 8px;
        height: 180px;
        overflow: auto;
        font-size: 12px;
    }

    label {
        font-size: 12px;
        opacity: 0.8;
    }
</style>
</head>

<body>

<div class="container">
    <h2>🔎 Motor de Busca</h2>

    <form id="form">
        <label>Arquivo</label>
        <input type="file" name="file">

        <label>Algoritmo</label>
        <select name="algorithm">
            <option value="naive">Naive</option>
            <option value="kmp">KMP</option>
            <option value="rabin">Rabin-Karp</option>
        </select>

        <label>Termo de busca</label>
        <input type="text" name="pattern" placeholder="Digite o texto...">

        <button type="submit">Pesquisar</button>
    </form>

    <pre id="result">Resultado aparecerá aqui...</pre>
</div>

<script>
document.getElementById("form").onsubmit = async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);

    const res = await fetch("http://localhost:8000/search", {
        method: "POST",
        body: formData
    });

    const data = await res.json();
    document.getElementById("result").textContent =
        JSON.stringify(data, null, 2);
};
</script>

</body>
</html>
